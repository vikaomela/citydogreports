<style>
:root {
  --bg:#f6f3ee;
  --paper:#fffaf2;
  --ink:#1f2328;
  --muted:#756b60;
  --line:#e1d8cb;
  --accent:#e9753d;
  --shadow:0 14px 36px rgba(55,43,30,.10);
}
* { box-sizing:border-box; }
html, body { margin:0; min-height:100%; }
body {
  font-family: Inter, ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
  color:var(--ink);
  background:
    radial-gradient(circle at top left, rgba(233,117,61,.12), transparent 32%),
    linear-gradient(180deg,#fbf7ef 0%,var(--bg) 100%);
}
.shell {
  width:min(1500px,100%);
  margin:0 auto;
  padding:24px;
}
.header {
  display:flex;
  align-items:center;
  justify-content:space-between;
  gap:20px;
  padding:24px 28px;
  margin-bottom:16px;
  background:rgba(255,250,242,.92);
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
}
.brand h1 {
  margin:0;
  font-size:clamp(28px,4vw,44px);
  letter-spacing:-.04em;
}
.brand p {
  margin:6px 0 0;
  color:var(--muted);
}
.tabs {
  display:flex;
  gap:10px;
  flex-wrap:wrap;
  justify-content:flex-end;
}
.report-tab {
  appearance:none;
  border:1px solid var(--line);
  background:#fff;
  color:var(--ink);
  padding:11px 16px;
  border-radius:999px;
  font:inherit;
  font-weight:700;
  cursor:pointer;
  transition:.18s ease;
}
.report-tab:hover {
  transform:translateY(-1px);
  box-shadow:0 8px 20px rgba(55,43,30,.08);
}
.report-tab.active {
  background:var(--accent);
  border-color:var(--accent);
  color:#fff;
}
.frame-wrap {
  overflow:hidden;
  min-height:calc(100vh - 150px);
  background:#fff;
  border:1px solid var(--line);
  border-radius:22px;
  box-shadow:var(--shadow);
}
.report-frame {
  display:block;
  width:100%;
  height:calc(100vh - 150px);
  min-height:760px;
  border:0;
  background:#fff;
}
.report-frame[hidden] { display:none; }
@media (max-width:760px) {
  .shell { padding:10px; }
  .header {
    align-items:flex-start;
    flex-direction:column;
    padding:20px;
  }
  .tabs { justify-content:flex-start; }
  .report-frame {
    height:calc(100vh - 205px);
    min-height:680px;
  }
}
</style>

<script>
function loadFrame(frame) {
  if (!frame.src) {
    frame.src = frame.dataset.src;
  }
}

const tabs = document.querySelectorAll('.report-tab');
const frames = document.querySelectorAll('.report-frame');

tabs.forEach((tab) => {
  tab.addEventListener('click', () => {
    tabs.forEach((item) => item.classList.remove('active'));
    frames.forEach((frame) => frame.hidden = true);

    tab.classList.add('active');
    const frame = document.getElementById(tab.dataset.target);
    loadFrame(frame);
    frame.hidden = false;

    history.replaceState(null, '', '#' + tab.dataset.target);
  });
});

const hashTarget = location.hash.replace('#', '');
const hashTab = [...tabs].find((tab) => tab.dataset.target === hashTarget);

if (hashTab) {
  hashTab.click();
} else {
  loadFrame(document.querySelector('.report-frame:not([hidden])'));
}
</script>
